<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SeiCode is a Tamil-first programming experience with an interactive IDE, documentation, and modern landing experience." />
    <title>SeiCode - Tanglish Programming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              app: {
                bg: '#0A0A0C',
                surface: '#111113',
                card: '#151515',
                cardHover: '#1A1A1C',
                border: 'rgba(255, 255, 255, 0.08)',
                borderHover: 'rgba(255, 255, 255, 0.15)',
                text: '#E0E0E0',
                textSecondary: '#A5A5A5',
                textMuted: '#5A5A5A', // Accent Gray
                accent: '#FFFFFF',
              },
              syntax: {
                keyword: '#C678DD',   // Purple
                string: '#98C379',    // Green
                number: '#D19A66',    // Orange
                comment: '#5C6370',   // Gray
                func: '#61AFEF',      // Blue
                variable: '#E06C75'   // Red
              }
            },
            fontFamily: {
              sans: ['"Inter"', '"Plus Jakarta Sans"', 'sans-serif'],
              mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
            },
            boxShadow: {
              'glow': '0 0 30px rgba(255,255,255,0.03)',
              'depth': '0 20px 50px rgba(0,0,0,0.5)',
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
      
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: #0A0A0C;
        color: #E0E0E0;
      }
      
      ::selection {
        background-color: rgba(255, 255, 255, 0.15);
        color: #FFFFFF;
      }

      /* Dark Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0A0A0C; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>
</head>
  <body class="bg-app-bg text-app-text h-screen overflow-x-hidden antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
